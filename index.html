<!DOCTYPE html>
<html lang="es">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Roboto:wght@400;500;700;900&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- ========================================== -->
    <!--      3. CONFIGURACIÓN DE FIREBASE          -->
    <!-- ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // TUS LLAVES REALES
        const firebaseConfig = {
            apiKey: "AIzaSyBiyx9qNhBgXknIsM3kmanksNsOKi4p090",
            authDomain: "liga-softbol-pega.firebaseapp.com",
            projectId: "liga-softbol-pega",
            storageBucket: "liga-softbol-pega.firebasestorage.app",
            messagingSenderId: "123479362384",
            appId: "1:123479362384:web:90521fca4eb4c5fa3e3a55",
            measurementId: "G-WKK22W19CT"
        };

        window.firebaseConfigGlobal = firebaseConfig;

        try {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.storage = getStorage(app);
            window.auth = getAuth(app);
            signInAnonymously(window.auth).catch(err => console.warn("⚠️ Firebase Auth:", err.message));
        } catch (e) {
            console.error("❌ Error inicializando Firebase:", e);
        }

        window.handleUpload = async function(event) {
            event.preventDefault();
            const SHARED_PASSWORD = "SOFTBOL2025";
            
            if (!window.storage) {
                showToast("Error: Base de datos no conectada.", "error");
                return;
            }

            const teamSelect = document.getElementById('teamSelect');
            const fileInput = document.getElementById('logoFile');
            const passwordInput = document.getElementById('teamPassword');
            const submitBtn = document.querySelector('#uploadForm button[type="submit"]');

            if (!teamSelect.value || !fileInput.files[0]) {
                showToast("Faltan datos: Elige equipo y logo.", "warning");
                return;
            }
            if (passwordInput.value.trim().toUpperCase() !== SHARED_PASSWORD) {
                showToast("Contraseña incorrecta.", "error");
                return;
            }

            const file = fileInput.files[0];
            if (file.size > 15 * 1024 * 1024) {
                showToast("Imagen muy pesada (Máx 15MB).", "warning");
                return;
            }

            const originalBtnText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Subiendo...`;
            if(typeof lucide !== 'undefined') lucide.createIcons();

            try {
                const fileName = `logos/${teamSelect.value.replace(/[^a-z0-9]/gi, '_')}_${Date.now()}`;
                const storageRef = ref(window.storage, fileName);
                
                const snapshot = await uploadBytes(storageRef, file);
                const downloadURL = await getDownloadURL(snapshot.ref);

                await addDoc(collection(window.db, "pending_logos"), {
                    team: teamSelect.value,
                    logoUrl: downloadURL,
                    status: "pending",
                    createdAt: serverTimestamp()
                });

                showToast("¡Logo enviado con éxito!", "success");
                document.getElementById('uploadModal').close();
                document.getElementById('uploadForm').reset();
            } catch (error) {
                console.error("Upload Error:", error);
                showToast("Error al subir: " + error.message, "error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
                if(typeof lucide !== 'undefined') lucide.createIcons();
            }
        }
    </script>

    <!-- 4. Estilos Personalizados -->
    <script>
        function initTailwind() {
            if (typeof tailwind !== 'undefined') {
                tailwind.config = {
                    theme: {
                        extend: {
                            colors: {
                                pega: { navy: '#0f172a', blue: '#1e3a8a', gold: '#fbbf24', red: '#dc2626' }
                            },
                            fontFamily: {
                                'logo': ['"Black Ops One"', 'cursive'],
                                'sport': ['"Teko"', 'sans-serif'],
                                'body': ['"Roboto"', 'sans-serif'],
                            }
                        }
                    }
                }
            } else {
                setTimeout(initTailwind, 50);
            }
        }
        initTailwind();
    </script>

    <style>
        body {

            background-color: #0f172a;

            background-attachment: fixed;

            transition: all 0.3s ease;

        body.mobile-view {

            margin: 0 auto;

            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);

        .silver-gradient { background: linear-gradient(135deg, #e2e8f0 0%, #94a3b8 100%); }
        .bronze-gradient { background: linear-gradient(135deg, #fdba74 0%, #c2410c 100%); }

        .custom-scrollbar::-webkit-scrollbar { height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #fbbf24; border-radius: 3px; }

        .fade-in { animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tab-active { background: #fbbf24; color: #0f172a; border-bottom: 4px solid #b45309; box-shadow: 0 0 15px rgba(251, 191, 36, 0.4); }
        .tab-inactive { background: rgba(255,255,255,0.05); color: #94a3b8; border: 1px solid rgba(255,255,255,0.1); }
        .tab-inactive:hover { background: rgba(255,255,255,0.1); color: white; }

        dialog::backdrop { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); }
        
        #toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
        .toast { padding: 12px 20px; border-radius: 8px; color: white; font-weight: 500; box-shadow: 0 4px 10px rgba(0,0,0,0.5); animation: slideIn 0.3s ease-out; min-width: 250px; display: flex; align-items: center; gap: 10px; background: #333; border-left: 4px solid #888; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-success { background: #064e3b; border-color: #34d399; }
        .toast-error { background: #7f1d1d; border-color: #f87171; }
        .toast-warning { background: #78350f; border-color: #facc15; }

        /* Mejora UX: Sticky Table Column */
        .table-container { overflow-x: auto; position: relative; }
        .sticky-col { position: sticky; left: 0; z-index: 10; background-color: inherit; }
        /* Sombras para la columna sticky cuando hay scroll */
        .table-container.is-scrolling .sticky-col::after {
            content: ''; position: absolute; top: 0; right: -5px; bottom: 0; width: 5px;
            background: linear-gradient(to right, rgba(0,0,0,0.5), transparent); pointer-events: none;
        }
    </style>
</head>

                const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
                const link = document.createElement('link');
                link.rel = 'manifest'; link.href = URL.createObjectURL(manifestBlob);
                document.head.appendChild(link);

                if ('serviceWorker' in navigator) {
                    const swCode = `self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('activate', e => self.clients.claim()); self.addEventListener('fetch', e => {});`;
                    const swBlob = new Blob([swCode], {type: 'application/javascript'});

        function formatDriveUrl(rawUrl) {
            if (!rawUrl || rawUrl.length < 5 || rawUrl === '#N/A' || rawUrl.includes(" ")) return null;
            const match = rawUrl.match(/(?:id=|d\/)([a-zA-Z0-9_-]+)/);
            return match ? `https://lh3.googleusercontent.com/d/${match[1]}` : rawUrl;
        }

        function createAvatarHtml(name, extraClasses = "mx-auto") {
            if (!name) name = "??";
            const cleanName = name.replace(/['"]+/g, '');
            const words = cleanName.split(' ');
            let initials = words[0][0];
            if (words.length > 1 && words[1][0]) initials += words[1][0];
            initials = initials ? initials.toUpperCase() : "?";
            
            const colors = ['from-blue-600 to-blue-400', 'from-green-600 to-green-400', 'from-red-600 to-red-400', 'from-purple-600 to-purple-400', 'from-orange-600 to-orange-400'];
            const colorClass = colors[cleanName.length % colors.length];

            return `<div class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-gradient-to-br ${colorClass} flex items-center justify-center text-[10px] md:text-sm font-bold text-white shadow-inner border border-white/10 flex-shrink-0 ${extraClasses}">${initials}</div>`;
        }

        window.handleImageError = function(element, name) {

        // --- SISTEMA DE CACHÉ Y RED (Fase 3: Estabilidad Directa) ---
        async function fetchWithProxy(url) {
            // Mejora crucial: Intento Directo primero (GSheets CSV suele permitir CORS)
            try {
                const res = await fetch(url);
                if (res.ok) return await res.text();
            } catch (e) { console.warn("Fetch directo falló, usando fallback...", e); }

            // Fallbacks si falla el directo
            try {
                const proxy1 = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
                const res = await fetch(proxy1);
                if (res.ok) return await res.text();
            } catch (e) {}

            try {
                const proxy2 = `https://corsproxy.io/?${encodeURIComponent(url)}`;
                const res = await fetch(proxy2);
                if (res.ok) return await res.text();
            } catch (e) {}

            throw new Error("Fallo total de conexión");
        }

        async function fetchWithCache(url, forceRefresh = false) {
            const cacheKey = CACHE_VERSION + "_" + url; 
            let cachedData = null;
            let networkPromise = fetchWithProxy(url);

            if (!forceRefresh) {
                const cached = localStorage.getItem(cacheKey);
                if (cached) {
                    try {
                        const { timestamp, data } = JSON.parse(cached);
                        if (Date.now() - timestamp < CACHE_DURATION) cachedData = data;
                    } catch (e) {}
                }
            }

            if (cachedData) {
                networkPromise.then(newData => {
                    if (newData !== cachedData) localStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), data: newData }));
                });
                return cachedData;
            }

            const data = await networkPromise;
            if (data && data.length > 50) localStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), data: data }));
            return data;
        }

        async function openTeamStats(teamName, rosterSheetId, logoUrl = "") {
            const modal = document.getElementById('teamStatsModal');
            const content = document.getElementById('teamStatsContent');
            const logoContainer = document.getElementById('modalTeamLogoContainer');
            const textContainer = document.getElementById('modalTeamNameText');
            const uploadBtn = document.getElementById('btn-upload-photo');

            uploadBtn.classList.remove('hidden');

            const finalUrl = formatDriveUrl(logoUrl);
            logoContainer.innerHTML = finalUrl ? `<img src="${finalUrl}" class="w-8 h-8 md:w-10 md:h-10 object-contain mr-2" referrerpolicy="no-referrer" onerror="this.outerHTML='<i data-lucide=\\'users\\' class=\\'w-6 h-6 text-pega-gold flex-shrink-0\\'></i>'">` : `<i data-lucide="users" class="w-6 h-6 text-pega-gold flex-shrink-0 mr-2"></i>`;

            content.innerHTML = `<div class="flex flex-col items-center justify-center py-12 h-full"><i data-lucide="loader-2" class="w-10 h-10 text-pega-gold animate-spin mb-4"></i><p class="text-slate-400 font-sport text-xl tracking-wide">BUSCANDO ROSTER...</p></div>`;
            refreshIcons();
            modal.showModal();

            try {
                const queryUrl = `https://docs.google.com/spreadsheets/d/${rosterSheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(teamName)}`;
                const response = await fetch(queryUrl);
                if (!response.ok) throw new Error("Equipo no encontrado");
                
                const txt = await response.text();
                const json = JSON.parse(txt.substring(47).slice(0, -2));
                
                let cols = json.table.cols.map(c => c.label || c.id).map(c => c.replace(/.* J\.$/, 'J.'));
                const gamesColIndex = cols.findIndex(c => c.trim() === 'J.' || c.trim() === 'J');

                let rows = json.table.rows.map(r => r.c.map(cell => cell ? (cell.v || cell.f || '') : '')).filter(r => {
                    const name = r[0] ? r[0].toString().trim() : "";
                    return name !== "" && name !== "0" && name !== "-" && name !== "JUGADOR" && name !== "JUGADORES";
                });

                if (rows.length > 0) {
                    content.innerHTML = `
                        <div class="overflow-x-auto custom-scrollbar rounded-none md:rounded-lg border-t border-b md:border border-white/10 h-full">
                            <table class="w-full text-xs md:text-sm text-left whitespace-nowrap relative border-collapse">

                                    <tr>${cols.map(c => `<th class="px-2 py-3 text-xs md:text-sm tracking-wider bg-[#0f172a] border-b border-pega-gold/30">${c}</th>`).join('')}</tr>
                                </thead>
                                <tbody class="divide-y divide-white/5 bg-[#0f172a]">
                                    ${rows.map((row, i) => {
                                        const isEligible = (gamesColIndex !== -1 && parseInt(row[gamesColIndex]) >= 4);
                                        const rowClass = isEligible ? 'bg-green-900/20 text-green-100 hover:bg-green-900/30' : `hover:bg-white/5 ${i%2===0 ? 'bg-white/[0.02]' : ''}`;
                                        return `<tr class="transition ${rowClass}">
                                            ${row.map((cell, idx) => {
                                                let displayCell = cell;
                                                const colName = cols[idx] ? cols[idx].toUpperCase() : '';
                                                if ((colName.includes("AVG") || colName.includes("PCT")) && !isNaN(parseFloat(cell)) && cell.toString().includes('.')) {
                                                    displayCell = parseFloat(cell) < 1 ? parseFloat(cell).toFixed(3).substring(1) : parseFloat(cell).toFixed(3); 
                                                }
                                                const cellClass = idx === 0 ? "font-bold text-white min-w-[150px] sticky left-0 z-10 bg-inherit border-r border-white/10" : "font-mono text-slate-300 text-center min-w-[40px]";
                                                return `<td class="px-2 py-2 text-[10px] md:text-xs ${cellClass}">${displayCell}</td>`;
                                            }).join('')}
                                        </tr>`
                                    }).join('')}
                                </tbody>
                            </table>

            toast.className = `toast toast-${type}`;
            let icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'alert-circle' : 'info');
            toast.innerHTML = `<i data-lucide="${icon}" class="w-5 h-5"></i> <span>${message}</span>`;
            container.appendChild(toast);
            refreshIcons();
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(100%)'; setTimeout(() => toast.remove(), 300); }, 4000);
        }

        async function loadCurrentTab(forceRefresh = false) {
            const container = document.getElementById('data-container');
            const loader = document.getElementById('loader');
            const activeTab = TABS.find(t => t.id === currentTabId);

            container.innerHTML = '';
            loader.style.display = 'block';
            document.getElementById('analysis-result').classList.add('hidden'); 

            const recentResultsContainer = document.getElementById('recent-results');
            if (activeTab.resultsGid) { 
                recentResultsContainer.classList.remove('hidden');
                loadRecentResults(forceRefresh); 
            } else { recentResultsContainer.classList.add('hidden'); }

            const csvUrl = `${BASE_SHEET_URL}?gid=${activeTab.gid}&single=true&output=csv`;

            try {
                let text = await fetchWithCache(csvUrl, forceRefresh);
                let rows = parseCSV(text);
                
                if (activeTab.type === 'leader') {
                    renderGroupedLeaderBoard(processLeaderData(rows.slice(0, 45), activeTab), activeTab);
                } else {
                    if (activeTab.maxRows) rows = rows.slice(0, activeTab.maxRows);
                    
                    const cleanRows = rows.filter(r => r.length > 1 && r[0] && !r[0].toUpperCase().includes("POS") && r[2] && r[2] !== "-" && !r[2].toUpperCase().includes("EQUIPO") && r[2] !== "FOTO")
                        .map(r => [r[0], r[1], r[2], r[3], r[4], r[5], r[6], r[7], r[8], r[9]]);

                    globalData = cleanRows;
                    renderStandings(cleanRows);
                    loadedTeams = cleanRows.map(r => r[2]); 
                    updateUploadOptions();
                }
                if(forceRefresh) showToast("Datos actualizados", "success");

            } catch (error) {
                showToast("Error cargando datos.", "error");
                container.innerHTML = `<div class="bg-red-900/50 border border-red-500 text-white p-6 rounded-xl text-center"><i data-lucide="alert-triangle" class="w-8 h-8 mx-auto mb-2 text-red-400"></i><p>Conexión interrumpida con el Servidor.</p></div>`;
            } finally {
                loader.style.display = 'none'; refreshIcons();
            }
        }

        // FASE 1: Ticker ESPN con Logos Globales
        async function loadRecentResults(forceRefresh = false) {
            const scroller = document.getElementById('results-scroller');
            scroller.innerHTML = `<div class="text-white text-xs p-4"><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i></div>`;

            try {
                const activeTab = TABS.find(t => t.id === currentTabId);
                const resultsGid = activeTab.resultsGid;
                if (!resultsGid) return; 

                const csvUrl = `${BASE_RESULTS_SHEET_URL}?gid=${resultsGid}&single=true&output=csv`;
                let text = await fetchWithCache(csvUrl, forceRefresh);
                const last5 = parseCSV(text).filter(r => r[0] && r[0].trim() !== "").slice(-5).reverse(); 

                scroller.innerHTML = last5.map(match => {
                    const [teamA, scoreA, scoreB, teamB] = match;
                    
                    // Buscar logos en el registro global
                    const infoA = window.globalTeamRegistry[teamA.toUpperCase()] || {};
                    const infoB = window.globalTeamRegistry[teamB.toUpperCase()] || {};
                    
                    const urlA = formatDriveUrl(infoA.logo);
                    const urlB = formatDriveUrl(infoB.logo);

                    const logoA = urlA ? `<img src="${urlA}" class="w-8 h-8 md:w-10 md:h-10 object-contain drop-shadow" onerror="handleImageError(this, '${teamA}')">` : createAvatarHtml(teamA, "w-8 h-8 md:w-10 md:h-10");
                    const logoB = urlB ? `<img src="${urlB}" class="w-8 h-8 md:w-10 md:h-10 object-contain drop-shadow" onerror="handleImageError(this, '${teamB}')">` : createAvatarHtml(teamB, "w-8 h-8 md:w-10 md:h-10");

                    return `
                        <div class="mlb-card bg-[#0f172a]/95 p-3 md:p-4 rounded-xl min-w-[280px] md:min-w-[320px] border border-white/10 shadow-lg transform hover:-translate-y-1 transition duration-300 group">
                            <div class="flex items-center justify-between gap-2">
                                <div class="flex flex-col items-center w-1/3">
                                    ${logoA}
                                    <span class="font-black text-white text-[10px] md:text-xs uppercase truncate w-full text-center mt-1" title="${teamA}">${teamA}</span>
                                </div>
                                <div class="w-1/3 flex justify-center">
                                    <div class="bg-black/60 rounded-lg py-1 px-3 border border-pega-gold/40 shadow-[0_0_15px_rgba(251,191,36,0.1)] group-hover:shadow-[0_0_20px_rgba(251,191,36,0.3)] transition">
                                        <span class="font-sport text-xl md:text-3xl text-pega-gold tracking-widest leading-none">${scoreA}-${scoreB}</span>
                                    </div>
                                </div>
                                <div class="flex flex-col items-center w-1/3">
                                    ${logoB}
                                    <span class="font-black text-white text-[10px] md:text-xs uppercase truncate w-full text-center mt-1" title="${teamB}">${teamB}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('') || `<div class="text-slate-500 text-xs italic p-2">Sin resultados recientes.</div>`;
            } catch (e) { scroller.innerHTML = `<div class="text-red-400 text-xs p-2">Error resultados.</div>`; }
        }

        function updateUploadOptions() {
            if (loadedTeams.length > 0) document.getElementById('teamSelect').innerHTML = '<option value="">Selecciona...</option>' + loadedTeams.map(t => `<option value="${t}">${t}</option>`).join('');
        }

        function parseCSV(text) { return text.split('\n').map(l => l.split(',').map(c => c ? c.trim().replace(/^"|"$/g, '') : '')); }

        async function preloadLeaders() {
            try {
                let text = await fetchWithCache(`${BASE_SHEET_URL}?gid=0&single=true&output=csv`);
                const rows = parseCSV(text).slice(0, 45); 
                TABS.filter(t => t.type === 'leader').forEach(config => {
                    const data = processLeaderData(rows, config);
                    for (let group in data) {
                        if (data[group].length > 0) {
                            const p = data[group][0]; 
                            if (!teamLeadersInfo[p.team.toUpperCase()]) teamLeadersInfo[p.team.toUpperCase()] = [];
                            teamLeadersInfo[p.team.toUpperCase()].push(`${config.label}: ${p.name} (${p.stat})`);
                        }
                    }
                });
            } catch (e) {}
        }

        function processLeaderData(rows, config) {
            let groups = {}; let currentGroupName = "GENERAL";
            rows.forEach((r, index) => {
                let groupIndex = Math.floor(index / 5);
                const fallbackNames = ["SUPER A-", "GRUPO A-", "GRUPO A+", "GRUPO A++++", "GRUPO B", "GRUPO C", "FDS A", "FDS B", "FDS C"];
                if (groupIndex < fallbackNames.length) currentGroupName = fallbackNames[groupIndex];
                if (r[config.groupCol] && r[config.groupCol].trim() !== "") currentGroupName = r[config.groupCol].trim().toUpperCase();

                let p = { rank: 0, name: r[config.nameCol] || '', team: r[config.teamCol] || '', stat: r[config.statCol] || '0' };
                if (p.name && p.stat !== '0') {
                    if (!groups[currentGroupName]) groups[currentGroupName] = [];
                    groups[currentGroupName].push(p);
                }
            });
            for (let g in groups) groups[g].sort((a, b) => parseFloat(b.stat) - parseFloat(a.stat));
            return groups;
        }

        function renderGroupedLeaderBoard(groups, config) {
            let html = `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
            Object.keys(groups).sort((a, b) => (DISPLAY_ORDER_PRIORITY.indexOf(a)===-1?999:DISPLAY_ORDER_PRIORITY.indexOf(a)) - (DISPLAY_ORDER_PRIORITY.indexOf(b)===-1?999:DISPLAY_ORDER_PRIORITY.indexOf(b))).forEach(groupName => {
                html += `
                <div class="mlb-card rounded-xl overflow-hidden flex flex-col group hover:border-pega-gold/50 transition duration-300">
                    <div class="bg-gradient-to-r ${config.color} p-4 text-white flex items-center justify-between border-b border-white/10">
                        <div><h3 class="font-sport text-xl md:text-2xl uppercase tracking-wider drop-shadow-md">${groupName}</h3><span class="text-[9px] font-bold opacity-80 bg-black/20 px-2 py-0.5 rounded">TOP 5 ${config.label}</span></div>
                        <i data-lucide="${config.icon}" class="w-6 h-6 md:w-8 md:h-8 text-white/20 transform group-hover:scale-125 group-hover:rotate-12 transition"></i>
                    </div>
                    <div class="p-0 flex-grow bg-[#0f172a]/40">
                        ${groups[groupName].slice(0, 5).map((p, i) => `<div class="flex items-center justify-between p-3 border-b border-white/5 hover:bg-white/5 transition"><div class="flex items-center gap-3 w-full"><div class="w-8 flex justify-center flex-shrink-0 ${i===0?'text-yellow-400':(i===1?'text-slate-300':(i===2?'text-orange-400':'text-slate-500 font-[Teko] text-xl'))}">${i<3?`<i data-lucide="medal" class="w-5 h-5"></i>`:`<span class="font-bold">${i+1}</span>`}</div><div class="min-w-0 flex-grow"><p class="font-black text-white text-base uppercase truncate font-sport leading-none mb-0.5">${p.name.toLowerCase()}</p><p class="text-[10px] text-slate-400 font-bold uppercase truncate">${p.team}</p></div><div class="text-right pl-2"><span class="font-sport font-black text-xl text-white tracking-widest">${p.stat}</span></div></div></div>`).join('')}
                    </div>
                </div>`;
            });
            document.getElementById('data-container').innerHTML = html + `</div>`;
        }

        // FASE 1: RENDERIZADO TABLA MEJORADA (Sticky Scroll y Fuentes)
        function renderStandings(data) {
            const container = document.getElementById('data-container');
            const activeTab = TABS.find(t => t.id === currentTabId);
            
            // Listener de scroll para poner sombra a la columna sticky
            setTimeout(() => {
                const tableCont = document.getElementById('main-table-container');
                if(tableCont) {
                    tableCont.addEventListener('scroll', () => {
                        if (tableCont.scrollLeft > 5) tableCont.classList.add('is-scrolling');
                        else tableCont.classList.remove('is-scrolling');
                    });
                }
            }, 100);

            let html = `
                <div class="mlb-card rounded-xl overflow-hidden shadow-2xl relative">
                    <div id="main-table-container" class="table-container custom-scrollbar">
                        <table class="w-full whitespace-nowrap border-collapse">
                            <thead class="bg-gradient-to-r from-pega-navy to-black text-white font-[Teko] border-b border-[#fbbf24]/50">
                                <tr>
                                    <!-- Columna Fija -->
                                    <th class="sticky-col px-3 py-3 text-left tracking-wider text-sm md:text-xl font-normal text-slate-200">EQUIPO</th>
                                    <!-- Columnas de Stats -->
                                    ${['JJ', 'JG', 'JE', 'JP', 'CF', 'CC', 'DIF'].map(h => `<th class="px-2 py-3 text-center tracking-wider text-xs md:text-xl font-normal text-slate-400">${h}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-white/5">
                                ${data.map(row => {
                                    const pos = row[0];
                                    let rowClass = 'hover:bg-white/5 transition text-center font-medium text-slate-300';
                                    let posBadge = 'bg-slate-700 text-slate-300';
                                    
                                    if(pos==1) { posBadge='gold-gradient text-black shadow-[0_0_10px_rgba(251,191,36,0.5)]'; rowClass += ' bg-yellow-500/5'; }
                                    if(pos==2) { posBadge='silver-gradient text-black'; }
                                    if(pos==3) { posBadge='bronze-gradient text-white'; }
                                    
                                    const teamName = row[2] || '-';
                                    const rawLogoUrl = row[1];
                                    const finalUrl = formatDriveUrl(rawLogoUrl);
                                    
                                    let logoHtml = finalUrl ? `<img src="${finalUrl}" class="w-8 h-8 md:w-12 md:h-12 object-contain flex-shrink-0 drop-shadow" referrerpolicy="no-referrer" onerror="handleImageError(this, '${teamName.replace(/'/g, "\\'")}')">` : createAvatarHtml(teamName, "w-8 h-8 md:w-12 md:h-12 flex-shrink-0");

                                    // Renderizado con Roboto para números y Teko para equipo
                                    return `<tr class="${rowClass}">
                                        <!-- COLUMNA FIJA (Sticky) -->
                                        <td class="sticky-col px-2 py-2 min-w-[200px] md:min-w-[300px]">
                                            <div class="flex items-center gap-2 md:gap-3">
                                                <span class="inline-flex w-5 h-5 md:w-7 md:h-7 rounded items-center justify-center text-[10px] md:text-sm font-black flex-shrink-0 ${posBadge}">${pos}</span>
                                                ${logoHtml}
                                                <div onclick="openTeamStats('${teamName.replace(/'/g, "\\'")}', '${activeTab.rosterId}', '${rawLogoUrl}')" class="cursor-pointer hover:text-pega-gold transition-colors font-sport font-bold text-white text-base md:text-2xl tracking-wide uppercase truncate leading-none pt-1" title="Ver Estadísticas del Equipo">
                                                    ${teamName}
                                                </div>
                                            </div>
                                        </td>
                                        
                                        <!-- COLUMNAS DE NÚMEROS (Legibles Roboto) -->
                                        <td class="px-2 py-3 text-center text-xs md:text-base font-bold text-slate-200">${row[3]||'-'}</td>
                                        <td class="px-2 py-3 text-center text-xs md:text-base font-black text-green-400">${row[4]||'-'}</td>
                                        <td class="px-2 py-3 text-center text-xs md:text-base font-bold text-slate-300">${row[5]||'-'}</td>
                                        <td class="px-2 py-3 text-center text-xs md:text-base font-black text-red-400">${row[6]||'-'}</td>
                                        <td class="px-2 py-3 text-center text-xs md:text-sm text-slate-400">${row[7]||'-'}</td>
                                        <td class="px-2 py-3 text-center text-xs md:text-sm text-slate-400">${row[8]||'-'}</td>
                                        <td class="px-2 py-3 text-center">
                                            <span class="font-bold text-white text-[11px] md:text-sm tracking-widest bg-white/10 rounded px-2 py-1">${row[9]||'-'}</span>
                                        </td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            
            container.innerHTML = html;
        }

        function generateStaticAnalysis() {
            const btn = document.getElementById('btn-analyze');
            const resultContainer = document.getElementById('analysis-result');
            const contentDiv = document.getElementById('analysis-content');
            
            if (!globalData || globalData.length === 0) { showToast("No hay datos para analizar.", "error"); return; }

            const originalText = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-6 h-6 animate-spin"></i> CALCULANDO...`; btn.disabled = true;

            setTimeout(() => {
                try {
                    let reportsHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">`;

                    globalData.forEach(team => {
                        const [pos, logo, name, jjR, jgR, jeR, jpR, cfR, ccR, difR] = team;
                        const jj = parseInt(jjR)||0; const jg = parseInt(jgR)||0; const jp = parseInt(jpR)||0;
                        const cf = parseInt(cfR)||0; const cc = parseInt(ccR)||0; const dif = parseInt(difR)||0;
                        
                        const pct = jj > 0 ? jg / jj : 0;
                        const avgRunsFor = jj > 0 ? (cf / jj).toFixed(1) : 0;
                        const avgRunsAgainst = jj > 0 ? (cc / jj).toFixed(1) : 0;
                        
                        let sColor = "border-slate-600", bClass = "bg-slate-600", bText = "EN DESARROLLO", aTitle = "Análisis", aText = "", kStat = "";
                        
                        if (jj === 0) { sColor="border-slate-500"; bText="POR DEBUTAR"; aTitle="Expectativa Alta"; aText="El equipo está en fase de preparación."; kStat="0 Juegos"; } 
                        else if (pct === 1.0 && jj >= 3) { sColor="border-[#fbbf24]"; bClass="bg-[#fbbf24] text-[#0f172a] animate-pulse"; bText="🔥 INVICTO"; aTitle="Máquina Perfecta"; aText="Nadie ha encontrado la fórmula para vencerlos."; kStat=`Racha ${jg}-0`; }
                        else if (pct >= 0.75) { sColor="border-green-500"; bClass="bg-green-600 text-white"; bText="ELITE"; aTitle="Candidato al Título"; aText=`Sólidez total. Ganan con autoridad.`; kStat=`Dif +${dif}`; }
                        else if (avgRunsFor >= 10 && avgRunsAgainst >= 8) { sColor="border-orange-500"; bClass="bg-orange-600 text-white"; bText="CAÑONEROS"; aTitle="Poder Ofensivo"; aText=`Anotan mucho (${avgRunsFor} pp), pero la defensa sufre.`; kStat=`${avgRunsFor} C/Juego`; }
                        else if (avgRunsAgainst <= 4 && pct > 0.4) { sColor="border-blue-500"; bClass="bg-blue-600 text-white"; bText="MURALLA"; aTitle="Defensa de Campeonato"; aText=`Pitcheo de élite (solo ${avgRunsAgainst} C permitidas).`; kStat=`${avgRunsAgainst} C. Contra/J`; }
                        else if (pct >= 0.4 && pct < 0.75) { sColor="border-indigo-400"; bClass="bg-indigo-500 text-white"; bText="EN PELEA"; aTitle="Equipo Peligroso"; aText=`Un equipo equilibrado que sabe competir.`; kStat=`Pct .${(pct*1000).toFixed(0)}`; }
                        else { sColor="border-red-500"; bClass="bg-red-600 text-white"; bText="EN ALERTA"; aTitle="Urgencia"; aText=`Prioridad: minimizar errores no forzados.`; kStat=`${cc} C. en Contra`; }

                        const leaders = teamLeadersInfo[name.toUpperCase().trim()];
                        let leaderHTML = leaders && leaders.length > 0 ? `<div class="mt-3 pt-2 border-t border-white/10 bg-white/5 -mx-4 -mb-4 px-4 py-2 rounded-b-lg"><p class="text-[10px] text-[#fbbf24] font-bold uppercase flex items-center gap-1 mb-1"><i data-lucide="star" class="w-3 h-3 fill-current"></i> Factor X</p><div class="text-xs text-slate-300">${leaders.map(l=>`<span class="block truncate">• ${l}</span>`).join('')}</div></div>` : "";

                        reportsHTML += `
                            <div class="bg-[#0f172a] border border-white/10 border-l-4 ${sColor} p-4 rounded-r-xl shadow-lg flex flex-col h-full hover:bg-[#1e293b] transition">
                                <div class="flex justify-between items-start mb-2">
                                    <div class="flex items-center gap-3 overflow-hidden">
                                        <div class="font-[Teko] text-3xl text-slate-600 w-8 text-center leading-none">#${pos}</div>
                                        <div class="min-w-0">
                                            <h4 class="text-white font-black text-lg leading-tight uppercase tracking-wide truncate" title="${name}">${name}</h4>
                                            <span class="text-[9px] uppercase font-bold px-2 py-0.5 rounded-full inline-block mt-1 ${bClass}">${bText}</span>
                                        </div>
                                    </div>
                                    <div class="text-right"><span class="block text-2xl font-[Teko] font-bold text-white">${jg}-${jp}</span></div>
                                </div>
                                <div class="mb-2 flex-grow">
                                    <p class="text-xs text-[#fbbf24] font-bold uppercase mb-1 flex items-center gap-1"><i data-lucide="activity" class="w-3 h-3"></i> ${aTitle}</p>
                                    <p class="text-sm text-slate-300 leading-relaxed">${aText}</p>
                                </div>
                                <div class="flex items-center justify-between text-xs text-slate-500 font-mono bg-black/30 p-2 rounded mb-1">
                                    <span>Récord: <strong class="text-white">${jg}-${jp}</strong></span><span>Clave: <strong class="text-white">${kStat}</strong></span>
                                </div>
                                ${leaderHTML}
                            </div>
                        `;
                    });

                    contentDiv.innerHTML = `<div class="flex items-center justify-between mb-6 pb-4 border-b border-white/10"><div><h3 class="font-[Teko] text-3xl text-white uppercase tracking-wide">Reporte de Scouting</h3><p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Análisis de Jornada</p></div><div class="text-right hidden sm:block"><span class="text-xs text-slate-500 block">Equipos Analizados</span><span class="text-xl font-black text-white font-[Teko]">${globalData.length}</span></div></div>` + reportsHTML + `</div>`;
                    resultContainer.classList.remove('hidden');
                    setTimeout(() => resultContainer.scrollIntoView({ behavior: 'smooth', block: 'start' }), 100);
                    lucide.createIcons();
                } catch (e) { showToast("Error al generar análisis.", "error"); } 
                finally { btn.disabled = false; btn.innerHTML = originalText; }
            }, 800); 
        }

        function openUploadModal() {
            if(loadedTeams.length > 0) document.getElementById('teamSelect').innerHTML = '<option value="">Selecciona...</option>' + loadedTeams.map(t => `<option value="${t}">${t}</option>`).join('');
            document.getElementById('uploadModal').showModal();
        }
    </script>
</body>
</html>
